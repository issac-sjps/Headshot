<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>證件照裁切工具</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0b0c10;
  --surface: #14151a;
  --surface2: #1e1f27;
  --border: #2a2b36;
  --accent: #d4f54a;
  --accent2: #54f5c8;
  --text: #eeeef0;
  --muted: #7a7a8a;
  --r: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans TC', sans-serif;
  min-height: 100vh;
}

header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 18px 32px;
  border-bottom: 1px solid var(--border);
}
.logo {
  font-family: 'Space Mono', monospace;
  font-size: 1.05rem;
  background: linear-gradient(120deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
header span { color: var(--muted); font-size: .82rem; }

.app {
  display: grid;
  grid-template-columns: 290px 1fr;
  min-height: calc(100vh - 58px);
}

.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 24px 18px;
  display: flex;
  flex-direction: column;
  gap: 24px;
  overflow-y: auto;
}

.section-label {
  font-size: .66rem;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 10px;
}

.upload-zone {
  border: 2px dashed var(--border);
  border-radius: var(--r);
  padding: 24px 14px;
  text-align: center;
  cursor: pointer;
  transition: border-color .2s, background .2s;
  position: relative;
}
.upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: rgba(212,245,74,.04); }
.upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.upload-icon { font-size: 1.8rem; margin-bottom: 6px; }
.upload-zone p { font-size: .8rem; color: var(--muted); line-height: 1.6; }
.upload-zone strong { color: var(--accent); font-size: .88rem; display: block; margin-bottom: 4px; }

.presets { display: flex; flex-direction: column; gap: 7px; }
.preset-btn {
  display: flex;
  align-items: center;
  gap: 11px;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: var(--r);
  padding: 10px 13px;
  cursor: pointer;
  transition: border-color .2s, background .2s;
  color: var(--text);
  font-family: inherit;
  text-align: left;
  width: 100%;
}
.preset-btn:hover { border-color: var(--accent); background: rgba(212,245,74,.05); }
.preset-btn.active { border-color: var(--accent); background: rgba(212,245,74,.08); }
.preset-thumb {
  flex-shrink: 0;
  background: var(--accent);
  border-radius: 3px;
  opacity: .75;
}
.preset-btn.active .preset-thumb { opacity: 1; }
.preset-info { flex: 1; }
.preset-name { font-size: .86rem; font-weight: 500; }
.preset-size { font-size: .71rem; color: var(--muted); margin-top: 2px; }

.custom-ratio {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 7px;
  align-items: center;
}
.custom-ratio input {
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  padding: 8px 8px;
  color: var(--text);
  font-family: inherit;
  font-size: .88rem;
  width: 100%;
  text-align: center;
  outline: none;
  transition: border-color .2s;
}
.custom-ratio input:focus { border-color: var(--accent2); }
.custom-ratio span { color: var(--muted); text-align: center; }

.size-controls { display: flex; flex-direction: column; gap: 9px; }
.size-row { display: flex; align-items: center; gap: 8px; }
.size-row label { font-size: .78rem; color: var(--muted); width: 72px; flex-shrink: 0; }
.size-row input[type=number] {
  flex: 1;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  padding: 7px 9px;
  color: var(--text);
  font-family: inherit;
  font-size: .86rem;
  outline: none;
  transition: border-color .2s;
}
.size-row input[type=number]:focus { border-color: var(--accent2); }
.size-row span { font-size: .76rem; color: var(--muted); }
.size-row select {
  flex: 1;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  padding: 7px 9px;
  color: var(--text);
  font-family: inherit;
  font-size: .86rem;
  outline: none;
}

.quality-row { display: flex; flex-direction: column; gap: 6px; }
.quality-row label { font-size: .78rem; color: var(--muted); display: flex; justify-content: space-between; }
.quality-row label em { color: var(--accent2); font-style: normal; }
input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; }

.actions { display: flex; flex-direction: column; gap: 9px; margin-top: auto; padding-top: 8px; }
.btn {
  border: none;
  border-radius: var(--r);
  padding: 11px 16px;
  font-family: inherit;
  font-size: .88rem;
  font-weight: 500;
  cursor: pointer;
  transition: opacity .2s, transform .1s;
  width: 100%;
}
.btn:active { transform: scale(.97); }
.btn-primary { background: var(--accent); color: #0b0c10; }
.btn-primary:hover { opacity: .88; }
.btn-secondary { background: var(--surface2); color: var(--text); border: 1.5px solid var(--border); }
.btn-secondary:hover { border-color: var(--accent2); }
.btn:disabled { opacity: .3; cursor: not-allowed; transform: none !important; }

.main {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 36px 32px;
  gap: 24px;
  background: var(--bg);
}

.empty-state { text-align: center; color: var(--muted); }
.empty-state .big-icon { font-size: 3.6rem; margin-bottom: 14px; opacity: .35; }
.empty-state p { font-size: .92rem; line-height: 1.8; }

.crop-wrapper {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 18px;
  width: 100%;
  max-width: 680px;
}

.crop-tools {
  display: flex;
  gap: 7px;
  flex-wrap: wrap;
  justify-content: center;
}
.tool-btn {
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  padding: 7px 13px;
  color: var(--text);
  font-family: inherit;
  font-size: .78rem;
  cursor: pointer;
  transition: border-color .2s;
  display: flex;
  align-items: center;
  gap: 5px;
}
.tool-btn:hover { border-color: var(--accent2); color: var(--accent2); }

.crop-container {
  background: var(--surface);
  border-radius: var(--r);
  border: 1px solid var(--border);
  overflow: hidden;
  width: 100%;
  max-height: 500px;
}
.crop-container img { display: block; max-width: 100%; }

.preview-section {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  padding: 20px;
  background: var(--surface);
  border-radius: var(--r);
  border: 1px solid var(--border);
}
.preview-label { font-size: .68rem; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; }
#previewCanvas {
  border-radius: 6px;
  border: 2px solid var(--border);
  box-shadow: 0 4px 20px rgba(0,0,0,.5);
  max-width: 180px;
  max-height: 180px;
  object-fit: contain;
}
#previewInfo { font-size: .74rem; color: var(--muted); }

.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--accent);
  color: #0b0c10;
  padding: 10px 22px;
  border-radius: 100px;
  font-size: .86rem;
  font-weight: 600;
  transition: transform .32s cubic-bezier(.34,1.56,.64,1);
  z-index: 999;
  pointer-events: none;
  white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

@media (max-width: 780px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { border-right: none; border-bottom: 1px solid var(--border); }
  .main { padding: 20px 14px; }
}
</style>
</head>
<body>

<header>
  <div class="logo">PhotoCrop</div>
  <span>／ 證件照裁切工具</span>
</header>

<div class="app">

  <aside class="sidebar">

    <!-- 上傳 -->
    <div>
      <div class="section-label">上傳照片</div>
      <div class="upload-zone" id="uploadZone">
        <input type="file" id="fileInput" accept="image/*">
        <div class="upload-icon">📷</div>
        <strong>點擊或拖曳上傳</strong>
        <p>支援 JPG、PNG、WEBP</p>
      </div>
    </div>

    <!-- 裁切比例 -->
    <div>
      <div class="section-label">裁切比例</div>
      <div class="presets" id="presets">

        <button class="preset-btn active" data-w="3.5" data-h="4.5" data-id="0">
          <div class="preset-thumb" style="width:21px;height:27px;"></div>
          <div class="preset-info">
            <div class="preset-name">2吋大頭照</div>
            <div class="preset-size">3.5 × 4.5 cm</div>
          </div>
        </button>

        <button class="preset-btn" data-w="4.7" data-h="4.2" data-id="1">
          <div class="preset-thumb" style="width:27px;height:24px;"></div>
          <div class="preset-info">
            <div class="preset-name">2吋半身照</div>
            <div class="preset-size">4.7 × 4.2 cm</div>
          </div>
        </button>

        <button class="preset-btn" data-w="3.5" data-h="2.8" data-id="2">
          <div class="preset-thumb" style="width:25px;height:20px;"></div>
          <div class="preset-info">
            <div class="preset-name">1吋證件照</div>
            <div class="preset-size">3.5 × 2.8 cm</div>
          </div>
        </button>

        <button class="preset-btn" data-w="5.0" data-h="5.0" data-id="3">
          <div class="preset-thumb" style="width:24px;height:24px;"></div>
          <div class="preset-info">
            <div class="preset-name">5 × 5 正方</div>
            <div class="preset-size">5.0 × 5.0 cm</div>
          </div>
        </button>

        <button class="preset-btn" data-w="0" data-h="0" data-id="4">
          <div class="preset-thumb" style="width:24px;height:20px;background:var(--muted);"></div>
          <div class="preset-info">
            <div class="preset-name">自由裁切</div>
            <div class="preset-size">不限比例</div>
          </div>
        </button>

      </div>

      <div style="margin-top:12px;">
        <div class="section-label" style="margin-bottom:8px;">自訂比例（寬 : 高）</div>
        <div class="custom-ratio">
          <input type="number" id="customW" placeholder="寬" min="0.1" step="0.1" value="3.5">
          <span>：</span>
          <input type="number" id="customH" placeholder="高" min="0.1" step="0.1" value="4.5">
        </div>
        <button class="btn btn-secondary" style="margin-top:8px;font-size:.8rem;padding:8px;" id="applyCustom">套用自訂比例</button>
      </div>
    </div>

    <!-- 輸出設定 -->
    <div>
      <div class="section-label">輸出設定</div>
      <div class="size-controls">
        <div class="size-row">
          <label>輸出寬度</label>
          <input type="number" id="outWidth" value="413" min="50" max="4000">
          <span>px</span>
        </div>
        <div class="size-row">
          <label>輸出高度</label>
          <input type="number" id="outHeight" value="531" min="50" max="4000">
          <span>px</span>
        </div>
        <div class="size-row">
          <label>格式</label>
          <select id="outFormat">
            <option value="image/jpeg">JPEG</option>
            <option value="image/png">PNG</option>
            <option value="image/webp">WEBP</option>
          </select>
        </div>
        <div class="quality-row">
          <label>品質 <em id="qualityVal">90%</em></label>
          <input type="range" id="quality" min="10" max="100" value="90">
        </div>
      </div>
    </div>

    <!-- 操作按鈕 -->
    <div class="actions">
      <button class="btn btn-primary" id="cropBtn" disabled>✂️ 裁切預覽</button>
      <button class="btn btn-secondary" id="downloadBtn" disabled>⬇ 下載照片</button>
    </div>

  </aside>

  <main class="main">

    <div class="empty-state" id="emptyState">
      <div class="big-icon">🪪</div>
      <p>請先上傳照片<br>選擇裁切比例後點擊「裁切預覽」<br>確認無誤再下載</p>
    </div>

    <div class="crop-wrapper" id="cropWrapper">
      <div class="crop-tools">
        <button class="tool-btn" id="rotateL">↺ 左旋 90°</button>
        <button class="tool-btn" id="rotateR">↻ 右旋 90°</button>
        <button class="tool-btn" id="flipH">⇔ 水平翻轉</button>
        <button class="tool-btn" id="flipV">⇕ 垂直翻轉</button>
        <button class="tool-btn" id="resetCrop">⟳ 重置</button>
        <button class="tool-btn" id="zoomIn">🔍＋</button>
        <button class="tool-btn" id="zoomOut">🔍－</button>
      </div>
      <div class="crop-container">
        <img id="cropImage" src="" alt="crop">
      </div>
    </div>

    <div class="preview-section" id="previewSection">
      <div class="preview-label">裁切預覽</div>
      <canvas id="previewCanvas"></canvas>
      <div id="previewInfo"></div>
    </div>

  </main>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
<script>
let cropper = null;
let currentRatio = { w: 3.5, h: 4.5 };
let croppedCanvas = null;
let flipXState = 1, flipYState = 1;

const presetOutputs = [
  { w: 413, h: 531 },
  { w: 555, h: 496 },
  { w: 413, h: 330 },
  { w: 591, h: 591 },
  { w: 800, h: 800 },
];

// Upload
const fileInput = document.getElementById('fileInput');
const uploadZone = document.getElementById('uploadZone');

uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) loadImage(file);
});
fileInput.addEventListener('change', e => { if (e.target.files[0]) loadImage(e.target.files[0]); });

function loadImage(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = document.getElementById('cropImage');
    if (cropper) { cropper.destroy(); cropper = null; }
    img.src = e.target.result;
    flipXState = 1; flipYState = 1;

    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('cropWrapper').style.display = 'flex';
    document.getElementById('previewSection').style.display = 'none';
    croppedCanvas = null;
    document.getElementById('downloadBtn').disabled = true;

    img.onload = () => {
      initCropper();
      document.getElementById('cropBtn').disabled = false;
    };
  };
  reader.readAsDataURL(file);
}

function initCropper() {
  const img = document.getElementById('cropImage');
  const ratio = (currentRatio.w === 0) ? NaN : currentRatio.w / currentRatio.h;
  cropper = new Cropper(img, {
    aspectRatio: ratio,
    viewMode: 1,
    dragMode: 'move',
    autoCropArea: 0.85,
    restore: false,
    guides: true,
    center: true,
    highlight: false,
    cropBoxMovable: true,
    cropBoxResizable: true,
    toggleDragModeOnDblclick: false,
  });
}

// Preset
document.getElementById('presets').addEventListener('click', e => {
  const btn = e.target.closest('.preset-btn');
  if (!btn) return;
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  const w = parseFloat(btn.dataset.w);
  const h = parseFloat(btn.dataset.h);
  const id = parseInt(btn.dataset.id);
  currentRatio = { w, h };

  const out = presetOutputs[id];
  document.getElementById('outWidth').value = out.w;
  document.getElementById('outHeight').value = out.h;

  if (cropper) cropper.setAspectRatio(w === 0 ? NaN : w / h);
  document.getElementById('customW').value = w || '';
  document.getElementById('customH').value = h || '';
});

// Custom ratio
document.getElementById('applyCustom').addEventListener('click', () => {
  const w = parseFloat(document.getElementById('customW').value) || 0;
  const h = parseFloat(document.getElementById('customH').value) || 0;
  if (w <= 0 || h <= 0) { showToast('請輸入有效的寬高值'); return; }
  currentRatio = { w, h };
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  if (cropper) cropper.setAspectRatio(w / h);
  showToast(`已套用比例 ${w} : ${h}`);
});

// Quality
document.getElementById('quality').addEventListener('input', function() {
  document.getElementById('qualityVal').textContent = this.value + '%';
});

// Tool buttons
document.getElementById('rotateL').addEventListener('click', () => { if (cropper) cropper.rotate(-90); });
document.getElementById('rotateR').addEventListener('click', () => { if (cropper) cropper.rotate(90); });
document.getElementById('flipH').addEventListener('click', () => {
  if (!cropper) return;
  flipXState *= -1;
  cropper.scaleX(flipXState);
});
document.getElementById('flipV').addEventListener('click', () => {
  if (!cropper) return;
  flipYState *= -1;
  cropper.scaleY(flipYState);
});
document.getElementById('resetCrop').addEventListener('click', () => {
  if (!cropper) return;
  cropper.reset();
  flipXState = 1; flipYState = 1;
});
document.getElementById('zoomIn').addEventListener('click', () => { if (cropper) cropper.zoom(0.1); });
document.getElementById('zoomOut').addEventListener('click', () => { if (cropper) cropper.zoom(-0.1); });

// Crop preview
document.getElementById('cropBtn').addEventListener('click', () => {
  if (!cropper) return;
  const w = parseInt(document.getElementById('outWidth').value) || 413;
  const h = parseInt(document.getElementById('outHeight').value) || 531;

  croppedCanvas = cropper.getCroppedCanvas({ width: w, height: h, imageSmoothingQuality: 'high' });

  const preview = document.getElementById('previewCanvas');
  const maxPrev = 180;
  const scale = Math.min(maxPrev / w, maxPrev / h, 1);
  preview.width = Math.round(w * scale);
  preview.height = Math.round(h * scale);
  const ctx = preview.getContext('2d');
  ctx.drawImage(croppedCanvas, 0, 0, preview.width, preview.height);

  document.getElementById('previewSection').style.display = 'flex';
  document.getElementById('previewInfo').textContent = `${w} × ${h} px`;
  document.getElementById('downloadBtn').disabled = false;
  showToast('裁切完成！可以下載了 ✅');
});

// Download
document.getElementById('downloadBtn').addEventListener('click', () => {
  if (!croppedCanvas) return;
  const format = document.getElementById('outFormat').value;
  const quality = parseInt(document.getElementById('quality').value) / 100;
  const ext = format === 'image/jpeg' ? 'jpg' : format === 'image/png' ? 'png' : 'webp';

  croppedCanvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `photo_${Date.now()}.${ext}`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('下載完成 🎉');
  }, format, quality);
});

// Toast
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2800);
}
</script>
</body>
</html>
