<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>證件照裁切工具</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #24242f;
    --border: #32323f;
    --accent: #d4f54a;
    --accent-dim: #a8c23a;
    --accent2: #6ef7cb;
    --red: #ff6b6b;
    --text: #eeeef5;
    --muted: #7a7a8e;
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    min-height: 100vh;
    padding: 24px 16px 60px;
  }
  .header { text-align: center; margin-bottom: 32px; }
  .header h1 {
    font-family: 'Space Mono', monospace;
    font-size: clamp(1.4rem, 4vw, 2rem);
    letter-spacing: -0.02em;
    color: var(--accent);
  }
  .header p { color: var(--muted); font-size: 0.88rem; margin-top: 6px; }
  .app { max-width: 960px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }
  .card-title {
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .card-title::before {
    content: '';
    display: inline-block;
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* Upload */
  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 48px 24px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }
  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--accent);
    background: rgba(212,245,74,0.04);
  }
  .upload-icon { font-size: 3rem; margin-bottom: 12px; display: block; }
  .upload-zone h3 { font-size: 1rem; font-weight: 500; margin-bottom: 6px; }
  .upload-zone p { font-size: 0.82rem; color: var(--muted); }
  #fileInput { display: none; }

  /* Presets */
  .presets { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  @media (min-width: 480px) { .presets { grid-template-columns: repeat(4, 1fr); } }
  .preset-btn {
    background: var(--surface2);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 10px;
    cursor: pointer;
    text-align: center;
    transition: all 0.18s;
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
  }
  .preset-btn:hover { border-color: var(--accent); background: rgba(212,245,74,0.06); }
  .preset-btn.active { border-color: var(--accent); background: rgba(212,245,74,0.1); }
  .preset-btn .preset-name { font-size: 0.9rem; font-weight: 700; display: block; margin-bottom: 4px; }
  .preset-btn .preset-size { font-size: 0.72rem; color: var(--muted); display: block; }
  .preset-btn.active .preset-name { color: var(--accent); }
  .preset-btn.active .preset-size { color: var(--accent-dim); }

  /* Crop section */
  .crop-section { display: none; }
  .crop-section.visible { display: block; }
  .crop-container {
    width: 100%;
    max-height: 500px;
    background: #111;
    border-radius: var(--radius);
    overflow: hidden;
  }
  .crop-container img { display: block; max-width: 100%; }
  .controls-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 14px;
    align-items: center;
  }
  .ctrl-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 8px 14px;
    font-size: 0.82rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: border-color 0.15s, background 0.15s;
    font-family: 'Noto Sans TC', sans-serif;
    white-space: nowrap;
  }
  .ctrl-btn:hover { border-color: var(--accent2); background: rgba(110,247,203,0.06); }
  .ctrl-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* BG removal panel */
  .bg-panel {
    margin-top: 14px;
    padding: 14px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
  }
  .bg-panel-label { font-size: 0.82rem; color: var(--muted); flex-shrink: 0; }

  /* bg color swatches */
  .swatch-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .swatch {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 2px solid var(--border);
    cursor: pointer;
    transition: border-color 0.15s, transform 0.15s;
    flex-shrink: 0;
  }
  .swatch:hover { transform: scale(1.15); }
  .swatch.active { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(212,245,74,0.4); }
  .swatch-white  { background: #ffffff; }
  .swatch-light  { background: #dce8f0; }
  .swatch-gray   { background: #cccccc; }
  .swatch-custom { background: linear-gradient(135deg,#f00,#0f0,#00f); position:relative; overflow:hidden; }
  #customColorInput {
    position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer; top: 0; left: 0;
  }

  /* AI remove bg button */
  .btn-rmbg {
    background: transparent;
    border: 1.5px solid var(--accent2);
    color: var(--accent2);
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 0.82rem;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    gap: 7px;
    white-space: nowrap;
  }
  .btn-rmbg:hover { background: rgba(110,247,203,0.08); }
  .btn-rmbg:disabled { opacity: 0.4; cursor: not-allowed; }

  /* progress bar */
  .progress-bar-wrap {
    width: 100%;
    background: var(--border);
    border-radius: 30px;
    height: 6px;
    overflow: hidden;
    display: none;
    flex-basis: 100%;
  }
  .progress-bar-wrap.visible { display: block; }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 30px;
    width: 0%;
    transition: width 0.3s;
  }
  .progress-text {
    font-size: 0.72rem;
    color: var(--accent2);
    flex-basis: 100%;
    display: none;
    font-family: 'Space Mono', monospace;
  }
  .progress-text.visible { display: block; }

  /* Settings */
  .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (min-width: 600px) { .settings-grid { grid-template-columns: 1fr 1fr 1fr; } }
  .field label {
    display: block; font-size: 0.75rem; color: var(--muted);
    margin-bottom: 6px; letter-spacing: 0.04em;
  }
  .field select, .field input[type=number] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 9px 12px;
    font-size: 0.85rem;
    outline: none;
    font-family: 'Noto Sans TC', sans-serif;
    transition: border-color 0.15s;
  }
  .field select:focus, .field input[type=number]:focus { border-color: var(--accent); }
  .field input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; }

  /* Preview */
  .preview-section { display: none; }
  .preview-section.visible { display: block; }
  .preview-wrap { display: flex; flex-wrap: wrap; gap: 20px; align-items: flex-start; margin-top: 18px; }
  .preview-box {
    border-radius: 4px;
    overflow: hidden;
    flex-shrink: 0;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    border: 1px solid var(--border);
  }
  .preview-box canvas { display: block; }
  .preview-info { flex: 1; min-width: 200px; }
  .info-row {
    display: flex; justify-content: space-between;
    padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 0.83rem;
  }
  .info-row:last-child { border-bottom: none; }
  .info-label { color: var(--muted); }
  .info-val { font-family: 'Space Mono', monospace; color: var(--accent2); font-size: 0.8rem; }

  .size-badge {
    display: inline-block;
    background: rgba(212,245,74,0.12);
    border: 1px solid rgba(212,245,74,0.3);
    border-radius: 20px;
    padding: 2px 10px;
    font-size: 0.72rem;
    color: var(--accent);
    font-family: 'Space Mono', monospace;
    margin-left: 6px;
    vertical-align: middle;
  }
  .size-badge.green {
    background: rgba(110,247,203,0.12);
    border-color: rgba(110,247,203,0.3);
    color: var(--accent2);
  }

  /* Download button */
  .btn-download {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    background: var(--accent);
    color: #111;
    border: none;
    border-radius: var(--radius);
    padding: 15px 24px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans TC', sans-serif;
    letter-spacing: 0.04em;
    transition: background 0.15s, transform 0.1s;
    margin-top: 16px;
  }
  .btn-download:hover { background: #e5ff60; transform: translateY(-1px); }
  .btn-download:active { transform: translateY(0); }
  .file-size-estimate {
    text-align: center;
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 8px;
    font-family: 'Space Mono', monospace;
  }
  .file-size-estimate span { color: var(--accent2); font-weight: 700; }

  /* Steps */
  .steps { display: flex; gap: 0; margin-bottom: 4px; }
  .step {
    flex: 1; text-align: center; padding: 8px 4px;
    font-size: 0.72rem; color: var(--muted);
    border-bottom: 2px solid var(--border);
    letter-spacing: 0.04em; transition: color 0.2s, border-color 0.2s;
  }
  .step.active { color: var(--accent); border-color: var(--accent); }
  .step.done   { color: var(--accent2); border-color: var(--accent2); }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 10px 22px;
    border-radius: 30px;
    font-size: 0.83rem;
    pointer-events: none;
    transition: transform 0.3s;
    z-index: 9999;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { border-color: var(--red); color: var(--red); }

  /* Spinner */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid transparent;
    border-top-color: currentColor;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }

  /* checkerboard for transparent bg preview */
  .checker {
    background-image: linear-gradient(45deg, #555 25%, transparent 25%),
                      linear-gradient(-45deg, #555 25%, transparent 25%),
                      linear-gradient(45deg, transparent 75%, #555 75%),
                      linear-gradient(-45deg, transparent 75%, #555 75%);
    background-size: 12px 12px;
    background-position: 0 0, 0 6px, 6px -6px, -6px 0px;
    background-color: #333;
  }
</style>
</head>
<body>

<div class="header">
  <h1>📸 證件照裁切工具</h1>
  <p>上傳 → 選規格 → 裁切 → AI去背 → 調整 → 下載</p>
</div>

<div class="app">

  <!-- Steps -->
  <div class="steps">
    <div class="step active" id="step1">① 上傳</div>
    <div class="step" id="step2">② 規格＆裁切</div>
    <div class="step" id="step3">③ 調整＆下載</div>
  </div>

  <!-- Upload -->
  <div class="card">
    <div class="card-title">上傳照片</div>
    <div class="upload-zone" id="uploadZone">
      <span class="upload-icon">🖼️</span>
      <h3>點擊選擇照片，或拖曳到此處</h3>
      <p>支援 JPG、PNG、WEBP</p>
      <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp">
    </div>
  </div>

  <!-- Presets -->
  <div class="card crop-section" id="presetCard">
    <div class="card-title">選擇照片規格</div>
    <div class="presets">
      <button class="preset-btn active"
        data-w="35" data-h="45" data-px="413"
        onclick="setPreset(this)">
        <span class="preset-name">2吋大頭照</span>
        <span class="preset-size">3.5 × 4.5 cm</span>
      </button>
      <button class="preset-btn"
        data-w="47" data-h="42" data-px="554"
        onclick="setPreset(this)">
        <span class="preset-name">2吋半身照</span>
        <span class="preset-size">4.7 × 4.2 cm</span>
      </button>
      <button class="preset-btn"
        data-w="35" data-h="28" data-px="413"
        onclick="setPreset(this)">
        <span class="preset-name">1吋證件照</span>
        <span class="preset-size">3.5 × 2.8 cm</span>
      </button>
      <button class="preset-btn"
        data-w="50" data-h="50" data-px="590"
        onclick="setPreset(this)">
        <span class="preset-name">5 × 5</span>
        <span class="preset-size">5.0 × 5.0 cm</span>
      </button>
    </div>
  </div>

  <!-- Crop -->
  <div class="card crop-section" id="cropCard">
    <div class="card-title">
      裁切照片
      <span id="currentPresetLabel" class="size-badge">2吋大頭照 (3.5×4.5 cm)</span>
    </div>
    <div class="crop-container">
      <img id="cropImage" src="" alt="裁切圖片">
    </div>

    <!-- Rotation / flip controls -->
    <div class="controls-row">
      <button class="ctrl-btn" onclick="cropper.rotate(-90)">↺ 左旋90°</button>
      <button class="ctrl-btn" onclick="cropper.rotate(90)">↻ 右旋90°</button>
      <button class="ctrl-btn" onclick="flipH()">⇄ 水平翻轉</button>
      <button class="ctrl-btn" onclick="flipV()">⇅ 垂直翻轉</button>
      <button class="ctrl-btn" onclick="cropper.reset(); scaleX=1; scaleY=1;">⟳ 重置</button>
      <button class="ctrl-btn" id="confirmCropBtn" onclick="triggerPreview()"
        style="margin-left:auto;border-color:var(--accent);color:var(--accent);font-weight:700;">
        ✂️ 確認裁切
      </button>
    </div>

    <!-- BG removal panel -->
    <div class="bg-panel">
      <span class="bg-panel-label">🎨 背景顏色：</span>
      <div class="swatch-row">
        <div class="swatch swatch-white active" title="白色" onclick="selectBg(this,'#ffffff')"></div>
        <div class="swatch swatch-light"        title="淺藍" onclick="selectBg(this,'#dce8f0')"></div>
        <div class="swatch swatch-gray"         title="淺灰" onclick="selectBg(this,'#cccccc')"></div>
        <div class="swatch swatch-custom" title="自訂顏色">
          <input type="color" id="customColorInput" value="#ffffff" oninput="onCustomColor(this)">
        </div>
      </div>

      <button class="btn-rmbg" id="rmbgBtn" onclick="removeBackground()">
        ✨ AI 自動去背景
      </button>

      <div class="progress-bar-wrap" id="progressWrap">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="progress-text" id="progressText"></div>
    </div>
  </div>

  <!-- Settings + Preview -->
  <div class="card preview-section" id="previewCard">
    <div class="card-title">輸出設定與預覽</div>

    <div class="settings-grid">
      <div class="field">
        <label>檔案格式</label>
        <select id="formatSelect" onchange="updatePreview()">
          <option value="image/jpeg">JPG（較小）</option>
          <option value="image/png">PNG（無損）</option>
          <option value="image/webp">WEBP（最小）</option>
        </select>
      </div>

      <div class="field">
        <label>輸出寬度（像素）</label>
        <input type="number" id="outWidth" value="413" min="100" max="3000" step="1"
          onchange="updatePreview()">
      </div>

      <div class="field">
        <label>壓縮品質 <span id="qualityVal" class="size-badge">90%</span></label>
        <input type="range" id="qualityRange" min="10" max="100" value="90" step="1"
          oninput="document.getElementById('qualityVal').textContent=this.value+'%'; updatePreview()">
      </div>
    </div>

    <!-- Preview -->
    <div class="preview-wrap">
      <div class="preview-box checker" id="previewBox">
        <canvas id="previewCanvas"></canvas>
      </div>
      <div class="preview-info">
        <div class="info-row">
          <span class="info-label">規格</span>
          <span class="info-val" id="infoPreset">—</span>
        </div>
        <div class="info-row">
          <span class="info-label">輸出尺寸（px）</span>
          <span class="info-val" id="infoPx">—</span>
        </div>
        <div class="info-row">
          <span class="info-label">格式</span>
          <span class="info-val" id="infoFmt">—</span>
        </div>
        <div class="info-row">
          <span class="info-label">背景</span>
          <span class="info-val" id="infoBg">—</span>
        </div>
        <div class="info-row">
          <span class="info-label">預估檔案大小</span>
          <span class="info-val" id="infoSize">—</span>
        </div>
        <div class="info-row">
          <span class="info-label">300 DPI 印刷尺寸</span>
          <span class="info-val" id="infoCm">—</span>
        </div>
      </div>
    </div>

    <!-- Download -->
    <button class="btn-download" onclick="downloadImage()">⬇ 下載照片</button>
    <div class="file-size-estimate" id="fileSizeEstimate"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<!-- Cropper -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

<!-- @imgly/background-removal via ESM CDN -->
<script type="module">
  import { removeBackground as imglyRemoveBg } from 'https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.4.5/+esm';
  window._imglyRemoveBg = imglyRemoveBg;
</script>

<script>
  let cropper   = null;
  let scaleX    = 1, scaleY = 1;
  let curW      = 35, curH = 45;
  let curName   = '2吋大頭照', curSizeCm = '3.5 × 4.5 cm';
  let croppedBlob      = null;
  let bgRemovedDataUrl = null;   // after AI removal
  let bgColor          = '#ffffff';
  let useRemovedBg     = false;

  // ── Upload ──
  const uploadZone = document.getElementById('uploadZone');
  const fileInput  = document.getElementById('fileInput');
  uploadZone.addEventListener('click', () => fileInput.click());
  uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
  uploadZone.addEventListener('drop', e => {
    e.preventDefault();
    uploadZone.classList.remove('dragover');
    if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener('change', () => { if (fileInput.files[0]) loadFile(fileInput.files[0]); });

  function loadFile(file) {
    if (!file.type.startsWith('image/')) { showToast('⚠️ 請上傳圖片檔案', true); return; }
    bgRemovedDataUrl = null;
    useRemovedBg = false;
    const reader = new FileReader();
    reader.onload = e => {
      document.getElementById('cropImage').src = e.target.result;
      document.querySelectorAll('.crop-section').forEach(el => el.classList.add('visible'));
      document.getElementById('previewCard').classList.remove('visible');
      setStep(2);
      initCropper();
    };
    reader.readAsDataURL(file);
  }

  // ── Cropper ──
  function initCropper() {
    if (cropper) { cropper.destroy(); cropper = null; }
    scaleX = 1; scaleY = 1;
    cropper = new Cropper(document.getElementById('cropImage'), {
      aspectRatio: curW / curH,
      viewMode: 1,
      dragMode: 'move',
      autoCropArea: 0.85,
      responsive: true,
      background: false,
      guides: true,
      center: true,
      highlight: false,
    });
  }

  function flipH() { scaleX *= -1; cropper.scaleX(scaleX); }
  function flipV() { scaleY *= -1; cropper.scaleY(scaleY); }

  // ── Preset ──
  function setPreset(btn) {
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    curW = parseInt(btn.dataset.w);
    curH = parseInt(btn.dataset.h);
    curName   = btn.querySelector('.preset-name').textContent;
    curSizeCm = btn.querySelector('.preset-size').textContent;
    document.getElementById('currentPresetLabel').textContent = curName + ' (' + curSizeCm + ')';
    document.getElementById('outWidth').value = btn.dataset.px || 413;
    if (cropper) { cropper.setAspectRatio(curW / curH); cropper.reset(); scaleX = 1; scaleY = 1; }
    bgRemovedDataUrl = null; useRemovedBg = false;
  }
  window.setPreset = setPreset;

  // ── Background color ──
  function selectBg(el, color) {
    document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
    el.classList.add('active');
    bgColor = color;
    if (document.getElementById('previewCard').classList.contains('visible')) updatePreview();
  }
  window.selectBg = selectBg;

  function onCustomColor(input) {
    const swatches = document.querySelectorAll('.swatch');
    swatches.forEach(s => s.classList.remove('active'));
    document.querySelector('.swatch-custom').classList.add('active');
    bgColor = input.value;
    if (document.getElementById('previewCard').classList.contains('visible')) updatePreview();
  }
  window.onCustomColor = onCustomColor;

  // ── AI Remove Background ──
  async function removeBackground() {
    if (!cropper) { showToast('⚠️ 請先上傳照片', true); return; }
    if (!window._imglyRemoveBg) { showToast('⚠️ AI 套件載入中，請稍後再試', true); return; }

    const btn = document.getElementById('rmbgBtn');
    const progressWrap = document.getElementById('progressWrap');
    const progressBar  = document.getElementById('progressBar');
    const progressText = document.getElementById('progressText');

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> AI 處理中…';
    progressWrap.classList.add('visible');
    progressText.classList.add('visible');
    progressBar.style.width = '0%';
    progressText.textContent = '正在下載 AI 模型（首次需要約30秒）…';

    // Get the current cropped canvas at medium resolution for the AI
    const w = parseInt(document.getElementById('outWidth').value) || 413;
    const h = Math.round(w / (curW / curH));
    const canvas = cropper.getCroppedCanvas({ width: w, height: h, imageSmoothingQuality: 'high' });

    try {
      // Convert canvas to blob for imgly
      const inputBlob = await new Promise(res => canvas.toBlob(res, 'image/png'));

      progressBar.style.width = '30%';
      progressText.textContent = '模型載入完成，正在去除背景…';

      const resultBlob = await window._imglyRemoveBg(inputBlob, {
        publicPath: 'https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.4.5/dist/',
        progress: (key, current, total) => {
          const pct = total ? Math.round((current / total) * 60) + 30 : 60;
          progressBar.style.width = Math.min(pct, 90) + '%';
          if (key === 'compute:inference') progressText.textContent = '正在辨識輪廓…';
          else if (key === 'fetch:model') progressText.textContent = '下載模型中 ' + Math.round(current/1024) + ' KB / ' + Math.round(total/1024) + ' KB';
        }
      });

      // Store as dataURL
      const reader = new FileReader();
      reader.onload = e => {
        bgRemovedDataUrl = e.target.result;
        useRemovedBg = true;
        progressBar.style.width = '100%';
        progressText.textContent = '✅ 去背景完成！';
        btn.disabled = false;
        btn.innerHTML = '✨ AI 自動去背景';
        triggerPreview();
        setTimeout(() => {
          progressWrap.classList.remove('visible');
          progressText.classList.remove('visible');
        }, 2000);
      };
      reader.readAsDataURL(resultBlob);

    } catch (err) {
      console.error(err);
      btn.disabled = false;
      btn.innerHTML = '✨ AI 自動去背景';
      progressWrap.classList.remove('visible');
      progressText.classList.remove('visible');
      showToast('❌ 去背景失敗：' + err.message, true);
    }
  }
  window.removeBackground = removeBackground;

  // ── Confirm crop ──
  function triggerPreview() {
    if (!cropper) return;
    const w = parseInt(document.getElementById('outWidth').value) || 413;
    const h = Math.round(w / (curW / curH));
    const canvas = cropper.getCroppedCanvas({ width: w, height: h, imageSmoothingQuality: 'high' });
    if (!canvas) { showToast('⚠️ 請先上傳照片', true); return; }
    renderPreview(canvas, w, h);
    document.getElementById('previewCard').classList.add('visible');
    setStep(3);
    setTimeout(() => document.getElementById('previewCard').scrollIntoView({ behavior: 'smooth', block: 'start' }), 120);
  }
  window.triggerPreview = triggerPreview;

  function updatePreview() {
    if (!cropper || !document.getElementById('previewCard').classList.contains('visible')) return;
    const w = parseInt(document.getElementById('outWidth').value) || 413;
    const h = Math.round(w / (curW / curH));
    const canvas = cropper.getCroppedCanvas({ width: w, height: h, imageSmoothingQuality: 'high' });
    if (canvas) renderPreview(canvas, w, h);
  }

  // ── Render preview ──
  function renderPreview(srcCanvas, w, h) {
    const fmt     = document.getElementById('formatSelect').value;
    const quality = parseInt(document.getElementById('qualityRange').value) / 100;
    const ext     = fmt === 'image/jpeg' ? 'JPG' : fmt === 'image/png' ? 'PNG' : 'WEBP';

    // compose final canvas (apply bg if needed)
    const finalCanvas = document.createElement('canvas');
    finalCanvas.width  = w;
    finalCanvas.height = h;
    const ctx = finalCanvas.getContext('2d');

    if (useRemovedBg && bgRemovedDataUrl) {
      // Fill background color
      ctx.fillStyle = bgColor;
      ctx.fillRect(0, 0, w, h);
      // Draw removed-bg image
      const img = new Image();
      img.onload = () => {
        ctx.drawImage(img, 0, 0, w, h);
        _finishRender(finalCanvas, w, h, fmt, quality, ext);
      };
      img.src = bgRemovedDataUrl;
    } else {
      ctx.drawImage(srcCanvas, 0, 0, w, h);
      _finishRender(finalCanvas, w, h, fmt, quality, ext);
    }
  }

  function _finishRender(canvas, w, h, fmt, quality, ext) {
    // Draw small preview (max 180px wide)
    const dW = Math.min(w, 180);
    const dH = Math.round(dW * (h / w));
    const pc  = document.getElementById('previewCanvas');
    pc.width = dW; pc.height = dH;
    pc.getContext('2d').drawImage(canvas, 0, 0, dW, dH);

    // Estimate file size
    const dataUrl = canvas.toDataURL(fmt, quality);
    const bytes   = Math.round(dataUrl.split(',')[1].length * 0.75);
    const sizeStr = formatBytes(bytes);

    // cm at 300 DPI
    const cmW = (w / 300 * 2.54).toFixed(1);
    const cmH = (h / 300 * 2.54).toFixed(1);

    const bgLabel = useRemovedBg
      ? 'AI去背 + ' + bgColor
      : '原始';

    document.getElementById('infoPreset').textContent = curName + ' (' + curSizeCm + ')';
    document.getElementById('infoPx').textContent     = w + ' × ' + h + ' px';
    document.getElementById('infoFmt').textContent    = ext + (fmt !== 'image/png' ? '  品質 ' + Math.round(quality*100) + '%' : '');
    document.getElementById('infoBg').textContent     = bgLabel;
    document.getElementById('infoSize').textContent   = sizeStr;
    document.getElementById('infoCm').textContent     = cmW + ' × ' + cmH + ' cm';

    // Show big estimate near download button
    document.getElementById('fileSizeEstimate').innerHTML =
      '預估下載大小：<span>' + sizeStr + '</span>';

    canvas.toBlob(blob => { croppedBlob = blob; }, fmt, quality);
  }

  function formatBytes(bytes) {
    if (bytes >= 1048576) return (bytes / 1048576).toFixed(2) + ' MB';
    return Math.round(bytes / 1024) + ' KB';
  }

  // ── Download ──
  function downloadImage() {
    if (!croppedBlob) { showToast('⚠️ 請先確認裁切', true); return; }
    const fmt  = document.getElementById('formatSelect').value;
    const ext  = fmt === 'image/jpeg' ? 'jpg' : fmt === 'image/png' ? 'png' : 'webp';
    const name = curName.replace(/\s/g,'_') + '.' + ext;
    const url  = URL.createObjectURL(croppedBlob);
    const a    = document.createElement('a');
    a.href = url; a.download = name; a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    showToast('✅ 已下載：' + name + '（' + formatBytes(croppedBlob.size) + '）');
  }
  window.downloadImage = downloadImage;

  // ── Steps ──
  function setStep(n) {
    for (let i = 1; i <= 3; i++) {
      document.getElementById('step'+i).className =
        'step' + (i < n ? ' done' : i === n ? ' active' : '');
    }
  }

  // ── Toast ──
  function showToast(msg, isError) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className   = 'toast show' + (isError ? ' error' : '');
    setTimeout(() => t.className = 'toast', 3000);
  }
</script>
</body>
</html>
